<title>软件下载</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC";
  background:linear-gradient(135deg,#ff7a7a,#ffb56b);
  display:flex;
  justify-content:center;
}

/* 卡片 */
.card{
  width:100%;
  max-width:420px;
  background:#fff;
  margin:80px 15px;
  padding:30px 22px 35px;
  border-radius:26px;
  box-shadow:0 25px 70px rgba(0,0,0,.25);
  text-align:center;
}

/* Logo */
.logo{
  width:110px;
  height:110px;
  border-radius:50%;
  object-fit:cover;
  margin-top:-85px;
  border:6px solid #fff;
  box-shadow:0 12px 30px rgba(0,0,0,.25);
}

/* 标题 */
h2{
  margin:12px 0 10px;
}

/* 邀请码 */
.invite{
  background:#fff6d8;
  border:2px dashed #ffc107;
  padding:16px;
  border-radius:16px;
  margin:16px 0 20px;
}

.code{
  font-size:28px;
  font-weight:bold;
  color:#ff4d4f;
  letter-spacing:2px;
}

/* 两列布局 */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

/* 按钮 */
.btn{
  display:block;
  padding:14px 0;
  border-radius:30px;
  color:#fff;
  text-decoration:none;
  font-size:15px;
  font-weight:bold;
  transition:.25s;
  box-shadow:0 8px 18px rgba(0,0,0,.15);
}

.btn:hover{
  transform:translateY(-2px);
}

/* 单独一排 */
.full{
  width:100%;
  margin-top:14px;
}

/* 颜色风格 */
.ios{background:linear-gradient(90deg,#4dabf7,#1c7ed6)}
.android{background:linear-gradient(90deg,#51cf66,#2f9e44)}
.common{background:linear-gradient(90deg,#ff8787,#ff6b6b)}
.order{background:linear-gradient(90deg,#63e6be,#339af0)}
.buy{background:linear-gradient(90deg,#f783ac,#e64980)}
.back{background:#adb5bd}
</style>
</head>

<body>

<div class="card">

<img src="logo1.png" class="logo">

<h2>懂你盒子</h2>

<div class="invite">
  <div>注册邀请码</div>
  <div class="code">226226</div>
</div>

<!-- 两排 -->
<div class="grid">

<a class="btn ios" href="https://dn1.live?promo_code=226226
">🍎 苹果下载</a>
<a class="btn android" href="https://dn1.live?promo_code=226226
">📱 安卓下载</a>

">⬇️ 通用下载</a>

</body>
</html>
